name: Deploy Telegram Bot

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Debug - Verificar secreto
      run: |
        if [ -z "${{ secrets.BOT_TOKEN }}" ]; then
          echo "❌ BOT_TOKEN no está configurado"
          exit 1
        else
          echo "✅ BOT_TOKEN está configurado (longitud: ${#BOT_TOKEN})"
        fi
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    - name: Run Telegram Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        echo "Iniciando bot..."
        python bot.py
